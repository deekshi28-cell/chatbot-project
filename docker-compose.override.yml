# Docker Compose override for development
version: '3.8'

services:
  backend:
    volumes:
      - ./backend:/app/backend
      - ./corded-evening-471908-m2-4ee5f45328d4.json:/app/credentials.json:ro
    environment:
      - DEBUG=1
    command: ["python", "-m", "uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    volumes:
      - ./frontend:/app/frontend
    environment:
      - FLASK_ENV=development
      - FLASK_DEBUG=1
