version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: chatbot-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb-init:/docker-entrypoint-initdb.d
    environment:
      MONGO_INITDB_DATABASE: chatbot_db
    networks:
      - chatbot-network 

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: chatbot-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongodb:27017
      - DB_NAME=chatbot_db
      - FASTAPI_HOST=0.0.0.0
      - FASTAPI_PORT=8000
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials.json
      - PUBSUB_TOPIC_CHAT_EVENTS=${PUBSUB_TOPIC_CHAT_EVENTS}
      - PUBSUB_SUBSCRIPTION_CHAT_PROCESSOR=${PUBSUB_SUBSCRIPTION_CHAT_PROCESSOR}
    volumes:
      - ./corded-evening-471908-m2-4ee5f45328d4.json:/app/credentials.json:ro
    depends_on:
      - mongodb
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: chatbot-frontend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FASTAPI_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - chatbot-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:

networks:
  chatbot-network:
    driver: bridge
